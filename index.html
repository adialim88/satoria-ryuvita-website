<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RYUVITA — The Living Ecosystem</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root{
    --emerald:#0b241a;
    --emerald-deep:#040d09;
    --ivory:#f4ecdd;
    --ivory-dim:rgba(244,236,221,.55);
    --gold:#c9a86a;
    --gold-soft:rgba(201,168,106,.35);
    --glass:rgba(12,28,21,.55);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#020604;font-family:'Inter',system-ui,sans-serif;color:var(--ivory)}
  ::selection{background:var(--gold-soft)}

  /* ---------- layers ---------- */
  #stage{position:fixed;inset:0}
  canvas#gl{position:absolute;inset:0;display:block}
  .film{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#020604;opacity:0;transition:none;pointer-events:none}
  #veil{position:fixed;inset:0;background:#020604;z-index:60;transition:opacity 1.4s ease;pointer-events:none}

  /* ---------- loader ---------- */
  #loader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:70;background:#020604;transition:opacity 1.2s ease}
  #loader .dot{width:6px;height:6px;border-radius:50%;background:var(--ivory);
    box-shadow:0 0 24px 6px rgba(230,214,180,.55);animation:breathe 2.6s ease-in-out infinite}
  @keyframes breathe{0%,100%{transform:scale(1);opacity:.55}50%{transform:scale(1.9);opacity:1}}

  /* ---------- skip ---------- */
  #skip{position:fixed;right:34px;bottom:30px;z-index:55;background:none;border:1px solid rgba(244,236,221,.18);
    color:var(--ivory-dim);font:300 11px/1 'Inter',sans-serif;letter-spacing:.22em;text-transform:uppercase;
    padding:12px 20px;border-radius:30px;cursor:pointer;opacity:0;transition:opacity 1s ease,border-color .3s,color .3s;backdrop-filter:blur(6px)}
  #skip:hover{border-color:var(--gold);color:var(--ivory)}
  #skip.show{opacity:1}

  /* ---------- logo ---------- */
  #logoWrap{position:fixed;left:50%;top:44%;transform:translate(-50%,-50%);z-index:40;text-align:center;
    opacity:0;filter:blur(14px);pointer-events:none;transition:opacity 2.4s ease,filter 2.4s ease}
  #logoWrap.reveal{opacity:1;filter:blur(0)}
  #logoWrap.dock{transition:all 1.6s cubic-bezier(.7,0,.2,1);left:52px;top:34px;transform:translate(0,0) scale(.42);transform-origin:left top}
  #logoImg{display:none;max-height:110px;max-width:340px}
  #wordmark{font:200 46px/1 'Inter',sans-serif;letter-spacing:.52em;text-indent:.52em;color:var(--ivory)}
  #wordtag{margin-top:16px;font:italic 300 15px/1.5 'Cormorant Garamond',serif;letter-spacing:.14em;color:var(--gold);
    opacity:0;transition:opacity 2s ease .8s}
  #logoWrap.reveal #wordtag{opacity:.9}
  #logoWrap.dock #wordtag{opacity:0;transition:opacity .4s ease}

  /* ---------- nav ---------- */
  #nav{position:fixed;top:38px;right:52px;z-index:45;display:flex;gap:38px;opacity:0;transition:opacity 1.8s ease}
  #nav.show{opacity:1}
  #nav a{color:var(--ivory-dim);text-decoration:none;font:300 11px/1 'Inter',sans-serif;letter-spacing:.24em;text-transform:uppercase;transition:color .3s}
  #nav a:hover{color:var(--ivory)}

  /* ---------- hint ---------- */
  #hint{position:fixed;left:50%;bottom:118px;transform:translateX(-50%);z-index:45;
    font:300 11px/1 'Inter',sans-serif;letter-spacing:.3em;text-transform:uppercase;color:var(--ivory-dim);
    opacity:0;transition:opacity 1.5s ease;pointer-events:none}
  #hint.show{opacity:.8}

  /* ---------- tooltip ---------- */
  #tip{position:fixed;z-index:48;pointer-events:none;opacity:0;transition:opacity .35s ease;
    font:300 12px/1 'Inter',sans-serif;letter-spacing:.24em;text-transform:uppercase;color:var(--ivory);
    padding:10px 16px;border:1px solid rgba(201,168,106,.35);border-radius:24px;background:var(--glass);backdrop-filter:blur(10px)}

  /* ---------- ingredient panel ---------- */
  #panel{position:fixed;top:50%;right:56px;transform:translateY(-50%) translateX(30px);width:340px;z-index:50;
    background:linear-gradient(160deg,rgba(14,32,24,.82),rgba(5,13,9,.86));backdrop-filter:blur(22px);
    border:1px solid rgba(201,168,106,.22);border-radius:18px;padding:34px 32px 30px;
    opacity:0;pointer-events:none;transition:opacity .7s ease,transform .7s cubic-bezier(.4,0,.2,1)}
  #panel.show{opacity:1;pointer-events:auto;transform:translateY(-50%) translateX(0)}
  #panel .kicker{font:300 10px/1 'Inter',sans-serif;letter-spacing:.34em;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
  #panel h2{font:300 24px/1.25 'Inter',sans-serif;letter-spacing:.04em;margin-bottom:6px}
  #panel .latin{font:italic 300 14px/1.4 'Cormorant Garamond',serif;color:var(--ivory-dim);margin-bottom:20px}
  #panel .sec{margin-bottom:18px}
  #panel .sec h3{font:400 10px/1 'Inter',sans-serif;letter-spacing:.3em;text-transform:uppercase;color:var(--ivory-dim);margin-bottom:8px}
  #panel .sec p{font:300 13px/1.7 'Inter',sans-serif;color:rgba(244,236,221,.82)}
  #panel .apps{display:flex;flex-wrap:wrap;gap:6px}
  #panel .apps span{font:300 11px/1 'Inter',sans-serif;letter-spacing:.06em;color:var(--ivory-dim);
    border:1px solid rgba(244,236,221,.14);padding:6px 12px;border-radius:20px}
  #panel .explore{margin-top:24px;display:inline-block;font:400 11px/1 'Inter',sans-serif;letter-spacing:.26em;text-transform:uppercase;
    color:var(--emerald-deep);background:linear-gradient(120deg,#d8bc84,#c9a86a);padding:14px 26px;border-radius:30px;border:none;cursor:pointer;transition:filter .3s}
  #panel .explore:hover{filter:brightness(1.1)}
  #panel .close{position:absolute;top:18px;right:20px;background:none;border:none;color:var(--ivory-dim);font-size:16px;cursor:pointer;transition:color .3s}
  #panel .close:hover{color:var(--ivory)}

  /* ---------- discovery ---------- */
  #discover{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:46;text-align:center;max-width:min(1080px,94vw);
    opacity:0;transition:opacity 1.8s ease .4s;pointer-events:none}
  #discover.show{opacity:1;pointer-events:auto}
  #discover .q{font:italic 300 17px/1 'Cormorant Garamond',serif;letter-spacing:.1em;color:var(--ivory-dim);margin-bottom:14px}
  #chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
  #chips button{font:300 11px/1 'Inter',sans-serif;letter-spacing:.14em;text-transform:uppercase;color:var(--ivory-dim);
    background:rgba(10,24,17,.5);border:1px solid rgba(244,236,221,.13);padding:10px 18px;border-radius:24px;cursor:pointer;
    backdrop-filter:blur(8px);transition:all .35s ease}
  #chips button:hover{border-color:var(--gold-soft);color:var(--ivory)}
  #chips button.active{background:linear-gradient(120deg,rgba(216,188,132,.92),rgba(201,168,106,.92));color:var(--emerald-deep);border-color:transparent}
  #focusNote{margin-top:12px;font:300 11px/1.6 'Inter',sans-serif;letter-spacing:.12em;color:var(--gold);opacity:0;transition:opacity .8s ease;min-height:14px}
  #focusNote.show{opacity:.95}

  @media (max-width:820px){
    #panel{right:50%;transform:translate(50%,-50%) translateY(20px);width:88vw}
    #panel.show{transform:translate(50%,-50%)}
    #nav{display:none}
    #wordmark{font-size:30px}
    #logoWrap.dock{left:24px;top:22px}
    #discover .q{font-size:15px}
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="gl"></canvas>
  <video class="film" id="filmA" muted playsinline preload="auto"></video>
  <video class="film" id="filmB" muted playsinline preload="auto"></video>
</div>

<div id="veil"></div>
<div id="loader"><div class="dot"></div></div>
<button id="skip">Skip film</button>

<div id="logoWrap">
  <img id="logoImg" alt="Ryuvita">
  <div id="wordmark">RYUVITA</div>
  <div id="wordtag">Nature, engineered for the future of nutrition</div>
</div>

<nav id="nav">
  <a href="#ingredients">Ingredients</a>
  <a href="#applications">Applications</a>
  <a href="#science">Science</a>
  <a href="#contact">Contact</a>
</nav>

<div id="hint">Drag to explore &nbsp;·&nbsp; Select an ingredient</div>
<div id="tip"></div>

<aside id="panel">
  <button class="close" aria-label="Close">✕</button>
  <div class="kicker" id="pKicker">Ingredient</div>
  <h2 id="pName"></h2>
  <div class="latin" id="pLatin"></div>
  <div class="sec"><h3>Key benefits</h3><p id="pBenefits"></p></div>
  <div class="sec"><h3>Scientific highlight</h3><p id="pScience"></p></div>
  <div class="sec"><h3>Applications</h3><div class="apps" id="pApps"></div></div>

</aside>

<div id="discover">
  <div class="q">What are you creating?</div>
  <div id="chips"></div>
  <div id="focusNote"></div>
</div>

<script type="importmap">
{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"

</script>

<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
import {RoomEnvironment} from 'three/addons/environments/RoomEnvironment.js';

/* ================= CONFIG ================= */
const FILM = [
  {local:'assets/scene1.mp4', remote:'https://d8j0ntlcm91z4.cloudfront.net/user_3GDFh7NOGPh6eySOHJHy3Cr5j27/hf_20260708_122123_f6565ae0-aa52-4468-a793-1cd438ecb0bb.mp4'},
  {local:'assets/scene2.mp4', remote:'https://d8j0ntlcm91z4.cloudfront.net/user_3GDFh7NOGPh6eySOHJHy3Cr5j27/hf_20260708_122128_1c5716d2-09d7-45ae-80bc-46fb1e36e4eb.mp4'},
  {local:'assets/scene3.mp4', remote:'https://d8j0ntlcm91z4.cloudfront.net/user_3GDFh7NOGPh6eySOHJHy3Cr5j27/hf_20260708_122153_96e053e9-717e-48c1-beeb-2623bbbd4d27.mp4'}
];
const LOGO_SRC = 'assets/logo.png';   // drop your logo here — falls back to wordmark

const INGREDIENTS = [
  {id:'fibre',   name:'Soluble Dietary Fibre', latin:'Fibra solubilis', theta:15,
   benefits:'Digestive wellness, prebiotic support and clean label sugar & fat reduction with exceptional process stability.',
   science:'Low-viscosity resistant dextrin retains ≥ 90 % fibre content across UHT, retort and low-pH systems.',
   apps:['Beverage','Dairy','Bakery','Medical'],
   tags:['Beverage','Dairy','Bakery','Sugar Reduction','High Fibre','Low GI','Medical Nutrition','Snacks']},
  {id:'protein', name:'Plant Protein', latin:'Oryza proteinum', theta:145,
   benefits:'Complete amino acid profile, hypoallergenic and exceptionally neutral in taste — protein fortification without compromise.',
   science:'Enzymatically isolated rice protein, ≥ 80 % purity with PDCAAS-optimised lysine complementation.',
   apps:['Sports','Bakery','Snacks'],
   tags:['Sports Nutrition','High Protein','Medical Nutrition','Bakery','Snacks','Infant Nutrition']},
  {id:'rice',    name:'Rice Ingredients', latin:'Oryza sativa', theta:55,
   benefits:'Clean label texture, gentle nutrition and natural mildness — the quiet foundation of infant and family nutrition.',
   science:'Precision-milled rice starches and flours with tailored gelatinisation curves for delicate systems.',
   apps:['Infant','Bakery','Dairy'],
   tags:['Infant Nutrition','Bakery','Snacks','Dairy','Beverage']},
  {id:'sweet',   name:'Natural Sweeteners', latin:'Dulcedo naturalis', theta:180,
   benefits:'Rounded, sugar-like sweetness from rice — enabling deep sugar reduction while preserving body and mouthfeel.',
   science:'Graded rice syrups, DE-controlled for predictable sweetness, browning and humectancy.',
   apps:['Beverage','Bakery','Dairy'],
   tags:['Sugar Reduction','Beverage','Bakery','Dairy','Snacks','Low GI']},
  {id:'carb',    name:'Functional Carbohydrates', latin:'Carbohydrata functionalia', theta:320,
   benefits:'Sustained energy release and low glycaemic response — engineered carbohydrates for performance and clinical nutrition.',
   science:'Slowly digestible carbohydrate matrices with clinically documented glycaemic index below 40.',
   apps:['Sports','Medical','Beverage'],
   tags:['Low GI','Sports Nutrition','Medical Nutrition','Beverage','Infant Nutrition']},
  {id:'future',  name:'Future Nutrition', latin:'Nutritio futura', theta:215,
   benefits:'Next-generation fermentation and biotransformation platforms — where Ryuvita research becomes tomorrow’s nutrition.',
   science:'Precision fermentation pipeline converting rice substrates into novel postbiotic and functional actives.',
   apps:['Medical','Sports','Beverage'],
   tags:['Medical Nutrition','Sports Nutrition','Infant Nutrition','Beverage','High Protein']}
];
const CATEGORIES = ['Beverage','Bakery','Dairy','Sports Nutrition','Medical Nutrition','Snacks',
                    'Infant Nutrition','Sugar Reduction','High Protein','High Fibre','Low GI'];

/* ================= SCENE ================= */
const canvas = document.getElementById('gl');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:false});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color('#030805');
scene.fog = new THREE.FogExp2('#030805', 0.028);

const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 120);
camera.position.set(0, 2.1, 8.7);

const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(renderer), 0.06).texture;

/* lights */
const key = new THREE.SpotLight('#f7ecd4', 260, 60, Math.PI/5, 0.55, 1.6);
key.position.set(0, 14, 4); scene.add(key);
const rim = new THREE.DirectionalLight('#cfe0c6', 0.5); rim.position.set(-6, 2, -6); scene.add(rim);
const warm = new THREE.PointLight('#c9a86a', 26, 30, 1.8); warm.position.set(0, -2.5, 3); scene.add(warm);
scene.add(new THREE.AmbientLight('#22392c', 0.55));

/* backdrop gradient + god rays + floor glow (canvas textures) */
function radialTex(stops, size=512){
  const c=document.createElement('canvas'); c.width=c.height=size;
  const g=c.getContext('2d'); const gr=g.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
  stops.forEach(s=>gr.addColorStop(s[0],s[1])); g.fillStyle=gr; g.fillRect(0,0,size,size);
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t;
}
function linearTex(stops, w=16, h=512){
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  const g=c.getContext('2d'); const gr=g.createLinearGradient(0,0,0,h);
  stops.forEach(s=>gr.addColorStop(s[0],s[1])); g.fillStyle=gr; g.fillRect(0,0,w,h);
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t;
}
const backdrop = new THREE.Mesh(
  new THREE.PlaneGeometry(90, 50),
  new THREE.MeshBasicMaterial({map:radialTex([[0,'#17392c'],[0.45,'#0b2318'],[1,'#020604']]), fog:false})
);
backdrop.position.set(0, 0.5, -22); scene.add(backdrop);

const rayMat = new THREE.MeshBasicMaterial({
  map:linearTex([[0,'rgba(220,235,215,0.32)'],[0.6,'rgba(200,220,195,0.06)'],[1,'rgba(200,220,195,0)']]),
  transparent:true, blending:THREE.AdditiveBlending, depthWrite:false, fog:false, opacity:.5
});
[[-2.6,.12],[0,.0],[2.8,-.14]].forEach(([x,rz],i)=>{
  const ray = new THREE.Mesh(new THREE.PlaneGeometry(2.4+i*0.6, 18), rayMat);
  ray.position.set(x, 6.5, -9); ray.rotation.z = rz; scene.add(ray);
});
const floorGlow = new THREE.Mesh(
  new THREE.PlaneGeometry(14, 6),
  new THREE.MeshBasicMaterial({map:radialTex([[0,'rgba(120,105,70,0.30)'],[0.5,'rgba(60,70,50,0.10)'],[1,'rgba(0,0,0,0)']]),
    transparent:true, blending:THREE.AdditiveBlending, depthWrite:false})
);
floorGlow.rotation.x = -Math.PI/2; floorGlow.position.y = -3.1; scene.add(floorGlow);

/* ---------- THE LIVING CORE ---------- */
const ecosystem = new THREE.Group(); scene.add(ecosystem);
const coreGroup = new THREE.Group(); ecosystem.add(coreGroup);

const coreGlass = new THREE.Mesh(
  new THREE.SphereGeometry(1.62, 96, 96),
  new THREE.MeshPhysicalMaterial({
    color:'#ffffff', transmission:1, roughness:0.04, thickness:1.6, ior:1.45,
    clearcoat:1, clearcoatRoughness:0.06, envMapIntensity:1.4,
    specularIntensity:1, transparent:true
  })
);
coreGroup.add(coreGlass);

const fibreMat = new THREE.MeshPhysicalMaterial({
  color:'#efe3cb', roughness:0.5, metalness:0, sheen:1, sheenColor:'#fff6e2',
  clearcoat:0.4, clearcoatRoughness:0.5, emissive:'#3a2f1c', emissiveIntensity:0.25
});
const fibres = new THREE.Group();
[[2,3,1.0],[3,4,0.84],[2,5,0.66]].forEach(([p,q,s],i)=>{
  const k = new THREE.Mesh(new THREE.TorusKnotGeometry(0.82*s, 0.085*s, 280, 16, p, q), fibreMat);
  k.rotation.set(i*1.1, i*0.7, i*0.4);
  fibres.add(k);
});
coreGroup.add(fibres);

function makeDust(count, radius, size, color, opacity){
  const pos = new Float32Array(count*3);
  for(let i=0;i<count;i++){
    const r = radius*Math.cbrt(Math.random());
    const th = Math.random()*Math.PI*2, ph = Math.acos(2*Math.random()-1);
    pos[i*3]=r*Math.sin(ph)*Math.cos(th); pos[i*3+1]=r*Math.cos(ph); pos[i*3+2]=r*Math.sin(ph)*Math.sin(th);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  const mat = new THREE.PointsMaterial({color, size, transparent:true, opacity,
    map:radialTex([[0,'rgba(255,255,255,1)'],[0.4,'rgba(255,255,255,0.5)'],[1,'rgba(255,255,255,0)']],64),
    blending:THREE.AdditiveBlending, depthWrite:false});
  return new THREE.Points(geo, mat);
}
coreGroup.add(makeDust(160, 1.35, 0.05, '#e8d9b8', 0.75));
scene.add(makeDust(420, 16, 0.06, '#9fae95', 0.16)); // ambient room dust

/* ---------- INGREDIENT NODES ---------- */
const RING_A = 3.65, RING_B = 2.3;
const ringTilt = new THREE.Group();
ringTilt.rotation.x = -0.44; ringTilt.rotation.z = 0.05;
ecosystem.add(ringTilt);

/* orbital gold rings */
function ellipseRing(a, b, tube, opacity){
  const pts=[]; for(let i=0;i<=140;i++){const t=i/140*Math.PI*2; pts.push(new THREE.Vector3(a*Math.cos(t), 0, b*Math.sin(t)));}
  const curve = new THREE.CatmullRomCurve3(pts, true);
  const mesh = new THREE.Mesh(new THREE.TubeGeometry(curve, 200, tube, 10, true),
    new THREE.MeshPhysicalMaterial({color:'#c8a565', metalness:0.75, roughness:0.28,
      emissive:'#8a6c33', emissiveIntensity:0.35, transparent:true, opacity}));
  return mesh;
}
ringTilt.add(ellipseRing(RING_A, RING_B, 0.014, 0.6));
const ring2 = ellipseRing(RING_A*1.06, RING_B*1.06, 0.010, 0.35);
ring2.rotation.x = 0.09; ringTilt.add(ring2);

const nodeGlassMat = () => new THREE.MeshPhysicalMaterial({
  color:'#ffffff', transmission:0.97, roughness:0.14, thickness:0.7, ior:1.4,
  clearcoat:0.8, clearcoatRoughness:0.2, envMapIntensity:0.85, transparent:true
});

function innerContent(id){
  const g = new THREE.Group();
  const ivory = new THREE.MeshPhysicalMaterial({color:'#efe6d2', roughness:0.75, sheen:0.8, sheenColor:'#fff'});
  if(id==='sweet'){ // golden syrup
    g.add(new THREE.Mesh(new THREE.IcosahedronGeometry(0.30, 3),
      new THREE.MeshPhysicalMaterial({color:'#e0a52e', transmission:0.75, roughness:0.1, thickness:0.8, ior:1.42,
        emissive:'#6b4a08', emissiveIntensity:0.5, attenuationColor:'#c07f14', attenuationDistance:1.6})));
  } else if(id==='protein'){
    for(let i=0;i<14;i++){const m=new THREE.Mesh(new THREE.SphereGeometry(0.07+Math.random()*0.05,16,16),ivory);
      m.position.setFromSphericalCoords(0.16+Math.random()*0.16, Math.acos(2*Math.random()-1), Math.random()*Math.PI*2); g.add(m);}
  } else if(id==='rice'){
    const grain=new THREE.CapsuleGeometry(0.028,0.09,4,10);
    for(let i=0;i<34;i++){const m=new THREE.Mesh(grain,ivory);
      m.position.setFromSphericalCoords(0.30*Math.cbrt(Math.random()), Math.acos(2*Math.random()-1), Math.random()*Math.PI*2);
      m.rotation.set(Math.random()*3,Math.random()*3,Math.random()*3); g.add(m);}
  } else if(id==='carb'){ // crystalline
    g.add(new THREE.Mesh(new THREE.OctahedronGeometry(0.27,0),
      new THREE.MeshPhysicalMaterial({color:'#f8f6ef', transmission:0.9, roughness:0.18, thickness:0.8, ior:1.55})));
    const shard=new THREE.OctahedronGeometry(0.08,0);
    for(let i=0;i<6;i++){const m=new THREE.Mesh(shard,ivory);
      m.position.setFromSphericalCoords(0.3, Math.acos(2*Math.random()-1), Math.random()*Math.PI*2); g.add(m);}
  } else if(id==='fibre'){
    g.add(new THREE.Mesh(new THREE.TorusKnotGeometry(0.20,0.045,160,12,2,3),
      new THREE.MeshPhysicalMaterial({color:'#f3ecdc', roughness:0.5, sheen:1, sheenColor:'#fff'})));
  } else { // future — soft green cells
    const green=new THREE.MeshPhysicalMaterial({color:'#9db98a', roughness:0.55, transmission:0.35, thickness:0.4, sheen:0.6});
    for(let i=0;i<10;i++){const m=new THREE.Mesh(new THREE.SphereGeometry(0.09+Math.random()*0.05,18,18),green);
      m.position.setFromSphericalCoords(0.18+Math.random()*0.14, Math.acos(2*Math.random()-1), Math.random()*Math.PI*2); g.add(m);}
  }
  g.add(makeDust(40, 0.34, 0.03, '#e8d9b8', 0.65));
  return g;
}

/* ---------- ribbons (flowing connections) ---------- */
const ribbonUniforms = [];
function makeRibbon(node){
  const uniforms = {uTime:{value:0}, uPulse:{value:1}};
  ribbonUniforms.push(uniforms);
  const mat = new THREE.ShaderMaterial({
    transparent:true, blending:THREE.AdditiveBlending, depthWrite:false,
    uniforms,
    vertexShader:`varying vec2 vUv; void main(){vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
    fragmentShader:`
      varying vec2 vUv; uniform float uTime; uniform float uPulse;
      void main(){
        float flow = fract(vUv.x*1.5 - uTime*0.22);
        float band = smoothstep(0.0,0.35,flow)*smoothstep(0.85,0.5,flow);
        vec3 col = mix(vec3(0.95,0.88,0.72), vec3(0.79,0.66,0.42), vUv.x);
        float edge = sin(vUv.y*3.14159);
        float a = (0.10 + 0.45*band) * edge * uPulse;
        gl_FragColor = vec4(col, a);
      }`
  });
  const mesh = new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3([new THREE.Vector3(),new THREE.Vector3(1,0,0)]), 60, 0.026, 8, false), mat);
  mesh.frustumCulled = false;
  node.ribbon = mesh;
  ringTilt.add(mesh);
}
function updateRibbon(node){
  const end = node.group.position.clone().multiplyScalar(0.97);
  const start = end.clone().normalize().multiplyScalar(1.7);
  start.y += 0.1;
  const mid1 = start.clone().lerp(end, 0.35); mid1.y += 0.35;
  const mid2 = start.clone().lerp(end, 0.7);  mid2.y -= 0.18;
  const curve = new THREE.CatmullRomCurve3([start, mid1, mid2, end]);
  node.ribbon.geometry.dispose();
  node.ribbon.geometry = new THREE.TubeGeometry(curve, 60, 0.026, 8, false);
}

/* ---------- build nodes ---------- */
const nodes = [];
INGREDIENTS.forEach(ing=>{
  const group = new THREE.Group();
  const glass = new THREE.Mesh(new THREE.SphereGeometry(0.52, 64, 64), nodeGlassMat());
  const inner = innerContent(ing.id);
  group.add(glass, inner);
  const node = {ing, group, glass, inner,
    theta: THREE.MathUtils.degToRad(ing.theta),
    baseTheta: THREE.MathUtils.degToRad(ing.theta),
    radiusScale:1, targetRadiusScale:1,
    scale:1, targetScale:1,
    dim:1, targetDim:1,
    bobOff: Math.random()*Math.PI*2};
  glass.userData.node = node;
  ringTilt.add(group);
  makeRibbon(node);
  nodes.push(node);
});

function placeNode(n, t){
  const a = RING_A*n.radiusScale, b = RING_B*n.radiusScale;
  n.group.position.set(a*Math.cos(n.theta), Math.sin(t*0.4+n.bobOff)*0.09, b*Math.sin(n.theta));
}

/* ================= INTERACTION ================= */
const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true; controls.dampingFactor = 0.045;
controls.enablePan = false; controls.enabled = false;
controls.minDistance = 4.6; controls.maxDistance = 13;
controls.minPolarAngle = Math.PI*0.22; controls.maxPolarAngle = Math.PI*0.62;
controls.rotateSpeed = 0.55; controls.zoomSpeed = 0.6;
controls.target.set(0, 0.1, 0);

const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2(-2,-2);
let hovered = null, selected = null, uiLive = false;

const tip = document.getElementById('tip');
addEventListener('pointermove', e=>{
  pointer.set(e.clientX/innerWidth*2-1, -(e.clientY/innerHeight)*2+1);
  tip.style.left = (e.clientX+18)+'px'; tip.style.top = (e.clientY-14)+'px';
});

const panel = document.getElementById('panel');
function openPanel(ing){
  document.getElementById('pName').textContent = ing.name;
  document.getElementById('pLatin').textContent = ing.latin;
  document.getElementById('pBenefits').textContent = ing.benefits;
  document.getElementById('pScience').textContent = ing.science;
  document.getElementById('pApps').innerHTML = ing.apps.map(a=>`<span>${a}</span>`).join('');
  panel.classList.add('show');
}
panel.querySelector('.close').onclick = ()=>{ panel.classList.remove('show'); selected=null; };
panel.querySelector('.explore').onclick = ()=>{ panel.querySelector('.explore').textContent='Coming soon';
  setTimeout(()=>panel.querySelector('.explore').textContent='Explore ingredient',1400); };

canvas.addEventListener('click', e=>{
  if(!uiLive) return;
  // fresh raycast — don't rely on the hover loop (fixes first-tap on touch devices)
  pointer.set(e.clientX/innerWidth*2-1, -(e.clientY/innerHeight)*2+1);
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(nodes.map(n=>n.glass), false);
  if(hits.length){ selected = hits[0].object.userData.node; openPanel(selected.ing); }
});

/* ---------- discovery mode ---------- */
const chipsEl = document.getElementById('chips');
const noteEl = document.getElementById('focusNote');
let activeCat = null;
CATEGORIES.forEach(cat=>{
  const b = document.createElement('button'); b.textContent = cat;
  b.onclick = ()=>{
    if(activeCat===cat){ activeCat=null; b.classList.remove('active'); resetFocus(); return; }
    activeCat = cat;
    [...chipsEl.children].forEach(c=>c.classList.remove('active'));
    b.classList.add('active');
    focusCategory(cat);
  };
  chipsEl.appendChild(b);
});
function focusCategory(cat){
  const rel = nodes.filter(n=>n.ing.tags.includes(cat));
  const irr = nodes.filter(n=>!n.ing.tags.includes(cat));
  /* relevant nodes sweep to the front arc (facing camera), others recede */
  const frontCenter = Math.PI/2; // +Z faces camera
  rel.forEach((n,i)=>{
    const spread = 0.82;
    n.theta = frontCenter + (i-(rel.length-1)/2)*spread;
    n.targetRadiusScale = 1.04; n.targetScale = 1.12; n.targetDim = 1;
  });
  irr.forEach((n,i)=>{
    n.theta = -Math.PI/2 + (i-(irr.length-1)/2)*0.5;
    n.targetRadiusScale = 1.35; n.targetScale = 0.8; n.targetDim = 0.25;
  });
  noteEl.textContent = `${rel.length} Ryuvita ingredient${rel.length>1?'s':''} engineered for ${cat.toLowerCase()}`;
  noteEl.classList.add('show');
}
function resetFocus(){
  nodes.forEach(n=>{ n.theta = n.baseTheta; n.targetRadiusScale=1; n.targetScale=1; n.targetDim=1; });
  noteEl.classList.remove('show');
}

/* ================= FILM INTRO + MAGIC TRANSITION ================= */
const veil = document.getElementById('veil');
const loader = document.getElementById('loader');
const skip = document.getElementById('skip');
const vids = [document.getElementById('filmA'), document.getElementById('filmB')];
let finished = false;

const blobCache = {};
function attach(v, url, timeout){
  return new Promise(res=>{
    let settled = false;
    const done = ok=>{ if(!settled){ settled = true; res(ok); } };
    v.onerror = ()=>done(false);
    v.addEventListener('canplaythrough', ()=>done(true), {once:true});
    v.src = url; v.load();
    setTimeout(()=>done(v.readyState>=3), timeout);
  });
}
async function loadFilm(v, src){
  // 1) local file next to the page (assets/…)
  if(await attach(v, src.local, 2500)) return true;
  // 2) remote CDN — fetch fully as a blob (CDN lacks range support; blob also gives gapless chaining)
  try{
    if(!blobCache[src.remote]){
      const resp = await fetch(src.remote);
      if(!resp.ok) return false;
      blobCache[src.remote] = URL.createObjectURL(await resp.blob());
    }
    return await attach(v, blobCache[src.remote], 15000);
  }catch(e){ return false; }
}

async function playFilm(){
  const ok0 = await loadFilm(vids[0], FILM[0]);
  if(!ok0){ enterLive(true); return; }
  loader.style.opacity = 0; setTimeout(()=>loader.remove(), 1300);
  vids[0].style.opacity = 1; vids[0].style.zIndex = 10;
  try{ await vids[0].play(); }catch(e){ enterLive(true); return; }
  veil.style.opacity = 0;
  setTimeout(()=>skip.classList.add('show'), 2500);
  loadFilm(vids[1], FILM[1]);

  vids[0].onended = ()=>{
    vids[1].style.opacity=1; vids[1].style.zIndex=11;
    vids[1].play().catch(()=>enterLive(true));
    setTimeout(()=>{vids[0].style.opacity=0;},120);
    // reuse element A for clip 3
    loadFilm(vids[0], FILM[2]);
    vids[1].onended = ()=>{
      vids[0].style.opacity=1; vids[0].style.zIndex=12;
      vids[0].play().catch(()=>enterLive(true));
      setTimeout(()=>{vids[1].style.opacity=0;},120);
      // start rendering live scene under the video for the handoff
      startRendering();
      vids[0].onended = ()=>enterLive(false);
      // begin crossfade slightly before the end for total invisibility
      const v = vids[0];
      const watch = setInterval(()=>{
        if(v.duration && v.duration - v.currentTime < 1.2){ clearInterval(watch); enterLive(false); }
      }, 100);
    };
  };
}

skip.onclick = ()=>enterLive(true);

let rendering = false, transitionT = -1;
function startRendering(){ if(!rendering){ rendering = true; } }

function enterLive(hard){
  if(finished) return; finished = true;
  skip.classList.remove('show');
  startRendering();
  if(hard){
    veil.style.transition = 'opacity .7s ease';
    veil.style.opacity = 1;
    setTimeout(()=>{
      vids.forEach(v=>{v.pause(); v.style.opacity=0;});
      transitionT = 0;
      veil.style.transition = 'opacity 1.8s ease';
      veil.style.opacity = 0;
    }, 750);
  } else {
    // soft crossfade from final video frame to live render
    vids.forEach(v=>{ v.style.transition = 'opacity 2.2s ease'; v.style.opacity = 0; });
    transitionT = 0;
    setTimeout(()=>vids.forEach(v=>v.pause()), 2400);
  }
  loader.style.opacity = 0; setTimeout(()=>{ if(loader.parentNode) loader.remove(); }, 1300);
  setTimeout(revealBrand, 1900);
}

function revealBrand(){
  const wrap = document.getElementById('logoWrap');
  const img = document.getElementById('logoImg');
  const probe = new Image();
  probe.onload = ()=>{ img.src = LOGO_SRC; img.style.display='block'; document.getElementById('wordmark').style.display='none'; wrap.classList.add('reveal'); };
  probe.onerror = ()=>{ wrap.classList.add('reveal'); };
  probe.src = LOGO_SRC;
  setTimeout(()=>{
    wrap.classList.add('dock');
    document.getElementById('nav').classList.add('show');
    document.getElementById('discover').classList.add('show');
    document.getElementById('hint').classList.add('show');
    controls.enabled = true; uiLive = true;
    setTimeout(()=>document.getElementById('hint').classList.remove('show'), 6000);
  }, 4200);
}

/* ================= LOOP ================= */
const clock = new THREE.Clock();
function resize(){
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
}
addEventListener('resize', resize); resize();

function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;
  if(!rendering) return;

  /* breathing */
  const breathe = 1 + Math.sin(t*0.9)*0.014;
  coreGroup.scale.setScalar(breathe);
  fibres.rotation.y += dt*0.10; fibres.rotation.x += dt*0.028;
  fibres.children.forEach((k,i)=>{ k.rotation.z += dt*(0.02+i*0.012); });

  /* slow orbit + node easing */
  nodes.forEach(n=>{
    if(activeCat===null){ n.theta += dt*0.05; n.baseTheta += dt*0.05; }
    n.radiusScale += (n.targetRadiusScale-n.radiusScale)*Math.min(1,dt*2.2);
    const hoverScale = (hovered===n||selected===n) ? 1.22 : 1;
    n.scale += (n.targetScale*hoverScale-n.scale)*Math.min(1,dt*5);
    n.dim += (n.targetDim-n.dim)*Math.min(1,dt*2.5);
    placeNode(n, t);
    n.group.scale.setScalar(n.scale*(1+Math.sin(t*1.1+n.bobOff)*0.012));
    n.inner.rotation.y += dt*0.25; n.inner.rotation.x += dt*0.07;
    n.glass.material.opacity = 0.35 + 0.65*n.dim;
    n.glass.material.envMapIntensity = 0.5 + 0.9*n.dim + ((hovered===n||selected===n)?0.7:0);
    updateRibbon(n);
    n.ribbon.material.uniforms.uPulse.value = n.dim * ((hovered===n||selected===n)?1.9:1);
  });
  ribbonUniforms.forEach(u=>u.uTime.value = t);

  /* idle drift + transition drift */
  if(transitionT >= 0 && transitionT < 1){
    transitionT += dt/6;
    const e = 1-Math.pow(1-Math.min(transitionT,1),3);
    camera.position.z = 8.9 - e*0.5;
  } else if(!controls.enabled){
    camera.position.x = Math.sin(t*0.05)*0.15;
  }

  /* hover raycast */
  if(uiLive){
    raycaster.setFromCamera(pointer, camera);
    const hits = raycaster.intersectObjects(nodes.map(n=>n.glass), false);
    const h = hits.length ? hits[0].object.userData.node : null;
    if(h!==hovered){
      hovered = h;
      canvas.style.cursor = h ? 'pointer' : 'default';
      if(h){ tip.textContent = h.ing.name; tip.style.opacity = 1; } else tip.style.opacity = 0;
    }
  }

  controls.update();
  renderer.render(scene, camera);
}
animate();

/* ================= BOOT ================= */
const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
veil.style.opacity = 1;
if(reduced){ enterLive(true); }
else playFilm();
</script>
</body>
